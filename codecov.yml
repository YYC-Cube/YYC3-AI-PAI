# Codecov Configuration
# @description 测试覆盖率报告配置
# @version 1.0.0

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%  # 覆盖率下降超过1%时失败
        informational: false
    patch:
      default:
        target: auto
        threshold: 1%

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
  require_base: yes
  require_head: yes

ignore:
  - "src/app/components/ui/**"  # Radix UI组件
  - "**/*.d.ts"
  - "**/types/**"
  - "node_modules/"
  - "dist/"
  - "build/"

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

github_checks:
  annotations: true

# 覆盖率阈值
thresholds:
  lines: 90
  functions: 85
  branches: 80
  statements: 90
